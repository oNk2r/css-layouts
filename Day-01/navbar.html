<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1 – Flexbox Navbar</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family :'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f2eb;
            color:#1a1a1a;
        }
        .navbar{
            display:flex;
            justify-content: space-between;
            align-items: center;
            background:#1a1a1a;
            padding:0 2rem;
            height: 64px;
        }
        .logo{
            font-size:1.2rem;
            font-weight:bold;
            color:#f5f4f0;
            letter-spacing: 0.05rem;
            text-decoration: none;
        }
        .nav-links{
            display: flex;
            gap:2rem;
            list-style: none;
        }
        .nav-links a{
            color:#aaa;
            text-decoration: none;
            font-size:0.9rem;
            letter-spacing: 0.04rem;
            transition: color 0.3s ease;
        }
        .nav-links a:hover{
            color:#f5f4f0;
        }
        .hero{
            max-width:640px;
            margin:6rem auto;
            padding:0 1.5rem;
        }
        .hero h1{
            font-size:2.4rem;
            margin-bottom:1rem;
            line-height: 1.2;
        }
        .hero p{
            color:#555;
            line-height: 1.7;
        }
        .hero code{
            background:#d6d5d5;
            padding:0.2rem 0.4rem;
            border-radius:4px;
            font-family: 'Courier New', Courier, monospace;
            font-size:0.9rem;
        }

    </style>

</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">Mylogo</a>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="hero">
        <h1>'Day 1 – Flexbox Navbar</h1>

        <p> 
            The three key properties you used: <code>display: flex</code> , <code>justify-content: space-between</code> , and <code>align-items: center</code>.
        </p>
    </main>
</body>
</html>
